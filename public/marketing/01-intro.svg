<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <!-- SmartApe campaign banner #1 — Introduction (matches smartape.fun) -->
  <defs>
    <linearGradient id="brand" x1="0" y1="6" x2="0" y2="25" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ffd36b"/><stop offset="1" stop-color="#e0901a"/></linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB"><feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#ffb534" stop-opacity="0.16"/><stop offset="1" stop-color="#ffb534" stop-opacity="0"/></radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#ffb534" stop-opacity="0.10"/><stop offset="1" stop-color="#ffb534" stop-opacity="0"/></radialGradient>
    <radialGradient id="markglow" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#ffb534" stop-opacity="0.40"/><stop offset="1" stop-color="#ffb534" stop-opacity="0"/></radialGradient>
    <radialGradient id="vig" cx="50%" cy="42%" r="72%"><stop offset="0.55" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity="0.5"/></radialGradient>
    <radialGradient id="gridmask" cx="50%" cy="40%" r="60%"><stop offset="0" stop-color="#fff"/><stop offset="0.65" stop-color="#fff" stop-opacity="0.3"/><stop offset="1" stop-color="#000"/></radialGradient>
    <mask id="gm"><rect width="1600" height="900" fill="url(#gridmask)"/></mask>
  </defs>

  <rect width="1600" height="900" fill="#0a0805"/>
  <ellipse cx="800" cy="150" rx="720" ry="380" fill="url(#g1)"/>
  <ellipse cx="280" cy="800" rx="420" ry="300" fill="url(#g2)"/>
  <g stroke="#ffffff" stroke-opacity="0.045" stroke-width="1" mask="url(#gm)"><line x1="100" y1="0" x2="100" y2="900"/><line x1="200" y1="0" x2="200" y2="900"/><line x1="300" y1="0" x2="300" y2="900"/><line x1="400" y1="0" x2="400" y2="900"/><line x1="500" y1="0" x2="500" y2="900"/><line x1="600" y1="0" x2="600" y2="900"/><line x1="700" y1="0" x2="700" y2="900"/><line x1="800" y1="0" x2="800" y2="900"/><line x1="900" y1="0" x2="900" y2="900"/><line x1="1000" y1="0" x2="1000" y2="900"/><line x1="1100" y1="0" x2="1100" y2="900"/><line x1="1200" y1="0" x2="1200" y2="900"/><line x1="1300" y1="0" x2="1300" y2="900"/><line x1="1400" y1="0" x2="1400" y2="900"/><line x1="1500" y1="0" x2="1500" y2="900"/><line x1="0" y1="100" x2="1600" y2="100"/><line x1="0" y1="200" x2="1600" y2="200"/><line x1="0" y1="300" x2="1600" y2="300"/><line x1="0" y1="400" x2="1600" y2="400"/><line x1="0" y1="500" x2="1600" y2="500"/><line x1="0" y1="600" x2="1600" y2="600"/><line x1="0" y1="700" x2="1600" y2="700"/><line x1="0" y1="800" x2="1600" y2="800"/></g>

  <!-- kicker -->
  <text x="800" y="152" text-anchor="middle" font-family="Inter" font-weight="600" font-size="24" letter-spacing="9" fill="#c79a45">INTRODUCING</text>

  <!-- ape mark (centered) -->
  <circle cx="800" cy="290" r="160" fill="url(#markglow)"/>
  <g transform="translate(696 186) scale(6.5)">
    <rect x="0" y="0" width="32" height="32" rx="9" fill="#000000"/>
    <g filter="url(#glow)" fill="url(#brand)">
      <circle cx="8.6" cy="11" r="3.1"/>
      <circle cx="23.4" cy="11" r="3.1"/>
      <circle cx="16" cy="15.7" r="8.3"/>
      <circle cx="16" cy="18.7" r="4" fill="#000000"/>
      <circle cx="12.5" cy="13.7" r="1.55" fill="#000000"/>
      <circle cx="19.5" cy="13.7" r="1.55" fill="#000000"/>
      <circle cx="14.4" cy="18.5" r="0.85"/>
      <circle cx="17.6" cy="18.5" r="0.85"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="800" y="512" text-anchor="middle" font-family="Space Grotesk" font-weight="700" font-size="104" letter-spacing="-3" fill="#f5f1e8">SmartApe</text>

  <!-- headline -->
  <text x="800" y="592" text-anchor="middle" font-family="Space Grotesk" font-weight="600" font-size="44" letter-spacing="-0.5" fill="#efe9dc">Follow the smartest money on <tspan fill="#ffb534">Solana.</tspan></text>

  <!-- sub -->
  <text x="800" y="652" text-anchor="middle" font-family="Inter" font-weight="500" font-size="27" fill="#b8a888">Scored wallets    ·    Anti-rug fused    ·    Real-time Telegram alerts</text>

  <!-- CTA -->
  <text x="800" y="806" text-anchor="middle" font-family="Inter" font-weight="600" font-size="26"><tspan fill="#ffd98a">smartape.fun</tspan><tspan fill="#5f564a">       ·       </tspan><tspan fill="#ffd98a">t.me/smartapefun</tspan><tspan fill="#5f564a">       ·       </tspan><tspan fill="#9b9183">@smartape_fun</tspan></text>

  <rect width="1600" height="900" fill="url(#vig)"/>
</svg>
