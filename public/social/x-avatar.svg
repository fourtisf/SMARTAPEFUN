<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <!-- SmartApe — X profile picture (circle-safe). Wordmark-free brand mark. -->
  <defs><linearGradient id="brand" x1="0" y1="6" x2="0" y2="25" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ffd36b"/><stop offset="1" stop-color="#e0901a"/></linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="400" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ffd98a"/><stop offset="1" stop-color="#c9781a"/></linearGradient>
    <radialGradient id="amb" cx="50%" cy="47%" r="52%"><stop offset="0" stop-color="#ffb534" stop-opacity="0.22"/><stop offset="0.6" stop-color="#ffb534" stop-opacity="0.06"/><stop offset="1" stop-color="#ffb534" stop-opacity="0"/></radialGradient>
    <filter id="gA" x="-70%" y="-70%" width="240%" height="240%" color-interpolation-filters="sRGB"><feGaussianBlur in="SourceGraphic" stdDeviation="0.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="400" fill="#000000"/>
  <rect width="400" height="400" fill="url(#amb)"/>
  <circle cx="200" cy="200" r="185" fill="none" stroke="url(#ring)" stroke-opacity="0.55" stroke-width="3"/>
  <g transform="translate(60.8 60.8) scale(8.7)"><g filter="url(#gA)" fill="url(#brand)">
    <circle cx="8.6" cy="11" r="3.1"/>
    <circle cx="23.4" cy="11" r="3.1"/>
    <circle cx="16" cy="15.7" r="8.3"/>
    <circle cx="16" cy="18.7" r="4" fill="#000000"/>
    <circle cx="12.5" cy="13.7" r="1.55" fill="#000000"/>
    <circle cx="19.5" cy="13.7" r="1.55" fill="#000000"/>
    <circle cx="14.4" cy="18.5" r="0.85"/>
    <circle cx="17.6" cy="18.5" r="0.85"/>
  </g></g>
</svg>
