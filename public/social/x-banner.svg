<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" fill="none">
  <!-- SmartApe — X header (1500x500). Avatar overlaps bottom-left; key content kept clear. -->
  <defs>
    <linearGradient id="brand" x1="0" y1="6" x2="0" y2="25" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ffd36b"/><stop offset="1" stop-color="#e0901a"/></linearGradient>
    <filter id="gM" x="-70%" y="-70%" width="240%" height="240%" color-interpolation-filters="sRGB"><feGaussianBlur in="SourceGraphic" stdDeviation="0.7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#ffb534" stop-opacity="0.18"/><stop offset="1" stop-color="#ffb534" stop-opacity="0"/></radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#ffb534" stop-opacity="0.10"/><stop offset="1" stop-color="#ffb534" stop-opacity="0"/></radialGradient>
    <radialGradient id="gridmask" cx="50%" cy="40%" r="62%"><stop offset="0" stop-color="#fff"/><stop offset="0.7" stop-color="#fff" stop-opacity="0.35"/><stop offset="1" stop-color="#000"/></radialGradient>
    <mask id="gm"><rect width="1500" height="500" fill="url(#gridmask)"/></mask>
    <linearGradient id="cf" x1="0" y1="120" x2="0" y2="430" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ffb534" stop-opacity="0.20"/><stop offset="1" stop-color="#ffb534" stop-opacity="0"/></linearGradient>
    <linearGradient id="cs" x1="660" y1="368" x2="1410" y2="120" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#e0901a"/><stop offset="1" stop-color="#ffd98a"/></linearGradient>
    <filter id="cg" x="-70%" y="-70%" width="240%" height="240%" color-interpolation-filters="sRGB"><feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1500" height="500" fill="#000000"/>
  <ellipse cx="1230" cy="120" rx="430" ry="360" fill="url(#g1)"/>
  <ellipse cx="250" cy="250" rx="380" ry="320" fill="url(#g2)"/>
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" mask="url(#gm)"><line x1="100" y1="0" x2="100" y2="500"/><line x1="200" y1="0" x2="200" y2="500"/><line x1="300" y1="0" x2="300" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/><line x1="500" y1="0" x2="500" y2="500"/><line x1="600" y1="0" x2="600" y2="500"/><line x1="700" y1="0" x2="700" y2="500"/><line x1="800" y1="0" x2="800" y2="500"/><line x1="900" y1="0" x2="900" y2="500"/><line x1="1000" y1="0" x2="1000" y2="500"/><line x1="1100" y1="0" x2="1100" y2="500"/><line x1="1200" y1="0" x2="1200" y2="500"/><line x1="1300" y1="0" x2="1300" y2="500"/><line x1="1400" y1="0" x2="1400" y2="500"/><line x1="0" y1="100" x2="1500" y2="100"/><line x1="0" y1="200" x2="1500" y2="200"/><line x1="0" y1="300" x2="1500" y2="300"/><line x1="0" y1="400" x2="1500" y2="400"/></g>

  <!-- rising chart (right) -->
  <path d="M660 368 L744 332 L820 350 L912 286 L1000 306 L1092 232 L1186 256 L1282 172 L1410 120 L1410 430 L660 430 Z" fill="url(#cf)"/>
  <g filter="url(#cg)"><path d="M660 368 L744 332 L820 350 L912 286 L1000 306 L1092 232 L1186 256 L1282 172 L1410 120" fill="none" stroke="url(#cs)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="1410" cy="120" r="8.5" fill="#ffe1a0"/></g>
  <circle cx="1410" cy="120" r="17" fill="none" stroke="#ffb534" stroke-opacity="0.45" stroke-width="2"/>

  <!-- LIVE kicker -->
  <circle cx="102" cy="113" r="5" fill="#ffb534"/>
  <text x="120" y="120" font-family="Inter" font-weight="500" font-size="20" letter-spacing="5"><tspan fill="#ffd98a" font-weight="600">LIVE</tspan><tspan fill="#9b9183">  ·  SOLANA SMART-MONEY TRACKER</tspan></text>

  <!-- mark + wordmark -->
  <g transform="translate(96 148) scale(3.0)"><g filter="url(#gM)" fill="url(#brand)">
    <circle cx="8.6" cy="11" r="3.1"/>
    <circle cx="23.4" cy="11" r="3.1"/>
    <circle cx="16" cy="15.7" r="8.3"/>
    <circle cx="16" cy="18.7" r="4" fill="#000000"/>
    <circle cx="12.5" cy="13.7" r="1.55" fill="#000000"/>
    <circle cx="19.5" cy="13.7" r="1.55" fill="#000000"/>
    <circle cx="14.4" cy="18.5" r="0.85"/>
    <circle cx="17.6" cy="18.5" r="0.85"/>
  </g></g>
  <text x="224" y="226" font-family="Space Grotesk" font-weight="700" font-size="84" letter-spacing="-2" fill="#f5f1e8">SmartApe</text>

  <!-- headline + value props -->
  <text x="100" y="296" font-family="Space Grotesk" font-weight="600" font-size="33" letter-spacing="-0.3" fill="#f0ebe0">Follow the smartest money on <tspan fill="#ffb534">Solana.</tspan></text>
  <text x="100" y="338" font-family="Inter" font-weight="500" font-size="22" fill="#b8a888">Scored wallets  ·  Anti-rug fused  ·  Real-time Telegram alerts</text>

  <!-- CTA (bottom-right, clear of avatar) -->
  <text x="1404" y="464" text-anchor="end" font-family="Inter" font-weight="600" font-size="22"><tspan fill="#ffd98a">smartape.fun</tspan><tspan fill="#6f6557">    ·    </tspan><tspan fill="#ffd98a">t.me/smartapefun</tspan></text>
</svg>
